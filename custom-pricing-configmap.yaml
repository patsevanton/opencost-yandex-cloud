# ConfigMap для custom pricing OpenCost.
# Использование этого ConfigMap обязательно: кастомные цены из одного JSON в ConfigMap
# в актуальном OpenCost могут не подхватываться — https://github.com/opencost/opencost/issues/2925.
# Имя должно совпадать с opencost.customPricing.configmapName (по умолчанию custom-pricing-model).
# OpenCost ожидает плоские ключи в data, а не один JSON-файл.
# ВАЖНО: ключи ConfigMap должны совпадать с именами полей Go-структуры CustomPricing
# (с маленькой первой буквой), иначе OpenCost их проигнорирует. Примеры правильных ключей:
# CPU, RAM, storage, currencyCode, internetNetworkEgress, firstFiveForwardingRulesCost,
# additionalForwardingRuleCost, LBIngressDataCost. Ключи "currency" и "loadBalancer" НЕ работают
# (нет таких полей в структуре OpenCost) и вызывают ошибку загрузки ConfigMap.
# Для CPU, RAM, Storage при загрузке из ConfigMap OpenCost делит значение на число часов в месяце.
# OpenCost по умолчанию использует 730 ч/мес; указываем: почасовая_ставка * 730.
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-pricing-model
  namespace: opencost
data:
  provider: "custom"
  currencyCode: "RUB"
  description: "Yandex Cloud тарифы (₽)"
  # Месячные ставки (₽/мес за единицу). OpenCost делит на 730 → почасовая ставка.
  # Источники: skus.md (Billing API) + сверка с детализацией биллинга.
  CPU: "841.617"  # 1.1529 ₽/vCPU-час (Regular VM, Intel Ice Lake, 100% vCPU) × 730
  RAM: "224.402"  # 0.3074 ₽/ГБ-час (Regular VM, Intel Ice Lake, RAM) × 730
  storage: "3.251"  # 0.004453 ₽/ГБ-час (Стандартный диск HDD) × 730
  # Сеть: стоимость за 1 GiB egress (₽/GiB). OpenCost НЕ делит на 730.
  zoneNetworkEgress: "0"
  regionNetworkEgress: "0"
  internetNetworkEgress: "1.68"  # ₽/GiB (Исходящий трафик, стандартный тариф 10 ГБ – 1 ТБ)
  # Load Balancer: OpenCost ожидает ключи firstFiveForwardingRulesCost (₽/час, базовая ставка NLB),
  # additionalForwardingRuleCost (₽/час за правило сверх 5), LBIngressDataCost (₽/GiB входящего).
  # Ключ "loadBalancer" НЕ работает — нет такого поля в OpenCost.
  firstFiveForwardingRulesCost: "0.8564"  # ₽/час (NLB «Сетевой балансировщик нагрузки», sku dn237e0l3j9208rdb2q8; CSV: 20.55456/24)
  additionalForwardingRuleCost: "0"
  LBIngressDataCost: "0.0659"  # ₽/GiB (NLB входящий трафик, sku dn2ivnqcdhjijlq11se2; CSV: 0.048917/0.742519)