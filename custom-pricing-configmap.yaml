# ConfigMap для custom pricing OpenCost.
# Использование этого ConfigMap обязательно: кастомные цены из одного JSON в ConfigMap
# в актуальном OpenCost могут не подхватываться — https://github.com/opencost/opencost/issues/2925.
# Имя должно совпадать с opencost.customPricing.configmapName (по умолчанию custom-pricing-model).
# OpenCost ожидает плоские ключи в data, а не один JSON-файл.
# Для CPU, RAM, Storage при загрузке из ConfigMap OpenCost делит значение на 730 (считает ставки месячными),
# поэтому указываем месячные ставки: почасовая_ставка * 730.
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-pricing-model
  namespace: opencost
data:
  provider: "custom"
  currency: "RUB"
  description: "Yandex Cloud тарифы (₽)"
  # Месячные ставки (₽/мес за единицу), OpenCost переведёт в почасовые делением на 730.
  # Источники: skus.txt (Billing API) + сверка с детализацией биллинга (последний час).
  CPU: "953.818"  # 1.3066 ₽/vCPU-час (Regular VM Intel Cascade Lake 100% vCPU) * 730
  RAM: "248.492"  # 0.3404 ₽/ГБ-час (Regular VM Intel Cascade Lake RAM) * 730
  storage: "3.285"  # 0.0045 ₽/ГБ-час (Standard disk HDD); SSD ≈ 0.0182 → 13.286