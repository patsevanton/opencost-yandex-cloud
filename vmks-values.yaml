# Лейблы подов для группировки в OpenCost (aggregate=label:team) — стоимость по командам
vmsingle:
  spec:
    podMetadata:
      labels:
        team: metrics
  ingress:
    enabled: true
    ingressClassName: nginx
    path: /
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - vmsingle.apatsev.org.ru

vmagent:
  spec:
    podMetadata:
      labels:
        team: metrics

# Grafana — подчарт использует podLabels, не spec.podMetadata
grafana:
  podLabels:
    team: metrics
  ingress:
    ingressClassName: nginx
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - grafana.apatsev.org.ru

vmalert:
  spec:
    podMetadata:
      labels:
        team: metrics

# В VMKS чарте ключ — alertmanager (не vmalertmanager); spec уходит в CR VMAlertmanager (поддерживает podMetadata)
alertmanager:
  spec:
    podMetadata:
      labels:
        team: metrics

# Подчарт prometheus-node-exporter (ключ с дефисами); лейблы — через podLabels
prometheus-node-exporter:
  podLabels:
    team: metrics

# Подчарт kube-state-metrics; лейблы — через podLabels
kube-state-metrics:
  podLabels:
    team: metrics

# Подчарт victoria-metrics-operator; лейблы пода оператора — через podLabels (не spec)
victoria-metrics-operator:
  podLabels:
    team: metrics
