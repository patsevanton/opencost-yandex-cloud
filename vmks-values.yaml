vmsingle:
  enabled: false

vmcluster:
  enabled: true
  spec:
    retentionPeriod: "1"
    replicationFactor: 2
    vmstorage:
      replicaCount: 2
      storageDataPath: /vm-data
      storage:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 10Gi
    vmselect:
      enabled: true
      replicaCount: 2
      cacheMountPath: /select-cache
      storage:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 2Gi
    vminsert:
      enabled: true
      replicaCount: 2

grafana:
  ingress:
    ingressClassName: nginx
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - grafana.apatsev.org.ru
