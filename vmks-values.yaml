# Лейблы подов для группировки в OpenCost (aggregate=label:team) — стоимость по командам
vmsingle:
  spec:
    podMetadata:
      labels:
        team: metrics
  ingress:
    enabled: true
    ingressClassName: nginx
    path: /
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - vmsingle.apatsev.org.ru

vmagent:
  spec:
    podMetadata:
      labels:
        team: metrics

grafana:
  spec:
    podMetadata:
      labels:
        team: metrics
  ingress:
    ingressClassName: nginx
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - grafana.apatsev.org.ru
