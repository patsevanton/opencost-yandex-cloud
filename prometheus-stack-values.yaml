# kube-prometheus-stack: Prometheus, Grafana, Alertmanager, node-exporter, kube-state-metrics
# Установка: helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
#   --namespace monitoring --create-namespace -f prometheus-stack-values.yaml

grafana:
  ingress:
    ingressClassName: nginx
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - grafana.apatsev.org.ru

# Prometheus по умолчанию обнаруживает ServiceMonitor во всех namespace.
# Для скрейпинга OpenCost нужен ServiceMonitor в namespace opencost (создаётся чартом OpenCost).
