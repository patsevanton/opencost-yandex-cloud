# Скрейп метрик OpenCost (node_cpu_hourly_cost и др.) — без этого OpenCost показывает "No results"
# Применить: kubectl apply -f opencost-vmscrapeconfig.yaml
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMScrapeConfig
metadata:
  name: opencost
  namespace: vmks
spec:
  honorLabels: true
  scrapeTimeout: 10s
  scheme: http
  staticConfigs:
    - targets:
        - opencost.opencost.svc.cluster.local:9003
