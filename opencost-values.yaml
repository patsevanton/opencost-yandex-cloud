    opencost:
      exporter:
        defaultClusterId: "test"
        extraEnv:
          RESOLUTION_1D_RETENTION:              15      # Срок хранения данных с дневным разрешением (дни)
          RESOLUTION_1H_RETENTION:              49      # Срок хранения данных с часовым разрешением (часы)
          CLOUD_COST_MONTH_TO_DATE_INTERVAL:    6       # Интервал для расчета затрат за месяц (дни)
          CLOUD_COST_REFRESH_RATE_HOURS:        1       # Частота обновления данных о расходах (часы)
          CLOUD_COST_QUERY_WINDOW_DAYS:         7       # Окно запроса данных о расходах (дни)
          CLOUD_COST_RUN_WINDOW_DAYS:           3       # Окно запуска процессов расчета расходов (дни)
          CLOUD_PROVIDER:                       DEFAULT # Провайдер облака по умолчанию
          KUBECOST_SCRAPE_INTERVAL:             5m     # Интервал сбора метрик Kubecost (минуты)
          PROM_CLUSTER_ID_LABEL:                cluster # Метка кластера для Prometheus
          USE_CUSTOM_PROVIDER:                  true    # Использовать кастомного облачного провайдера
      prometheus:
        internal:
          serviceName: vmsingle-vmks-victoria-metrics-k8s-stack
          namespaceName: vmks
          port: 8428
      customPricing:
        enabled: true
        createConfigmap: false   # Используем свой ConfigMap (см. custom-pricing-configmap.yaml): чарт генерирует неверный формат
        provider: custom
      ui:
        modelFqdn: "localhost:9003" # Обход проблемы hairpin NAT в Yandex Cloud K8s: nginx проксирует через localhost вместо ClusterIP
        ingress:
          enabled: true
          ingressClassName: "nginx"
          hosts:
          - host: opencost.apatsev.org.ru
            paths:
            - /
      mcp:
        ingress:
          enabled: true
          ingressClassName: "nginx"
          hosts:
          - host: mcp-opencost.apatsev.org.ru
            paths:
            - path: /
              pathType: Prefix
      metrics:
        serviceMonitor:
          enabled: true
          namespace: opencost
          interval: 10m
