# Лейбл для группировки в OpenCost (aggregate=label:team) — стоимость по командам
podLabels:
  team: finops

opencost:
  # --- Collector DataSource OpenCost (внутренний кэш агрегатов стоимости) ---
  # Хранилище: внутри пода OpenCost (не VictoriaMetrics). Срок хранения кэша:
  retention1d: 15   # интервалов по 1 дню — хранить 15 дней данных с дневным разрешением
  retention1h: 49   # интервалов по 1 ч — хранить 49 часов данных с часовым разрешением

  exporter:
    # Идентификатор кластера по умолчанию, если в метриках нет метки из PROM_CLUSTER_ID_LABEL (у нас — cluster)
    #defaultClusterId: "test"
    # Persistence кэш Collector DataSource - внутреннего кеша Opencost
    persistence:
      enabled: true
      accessMode: ReadWriteOnce   # чарт по умолчанию пустой — без него PVC невалиден
      size: 10Gi   # явный размер — иначе чарт может подставить невалидный quantity для PVC
    extraEnv:
      CLOUD_PROVIDER:             DEFAULT  # Провайдер облака DEFAULT, если у вас используется Yandex Cloud
      KUBECOST_SCRAPE_INTERVAL:   5m       # Интервал сбора метрик из VictoriaMetrics K8s stack
      #PROM_CLUSTER_ID_LABEL:      cluster  # Метка кластера для Prometheus
      USE_CUSTOM_PROVIDER:        true     # Использовать кастомного облачного провайдера
      # Не дублировать kube_* метрики (уже отдаёт kube-state-metrics) — иначе sum(kube_pod_*) в Grafana даёт 2x
      # https://github.com/opencost/opencost/issues/1465
      EMIT_KSM_V1_METRICS:       "false"  # не отдавать полный набор KSM-метрик
      EMIT_KSM_V1_METRICS_ONLY:  "true"   # только минимальный набор KSMv1 для OpenCost
  prometheus:
    internal:
      serviceName: vmsingle-vmks-victoria-metrics-k8s-stack
      namespaceName: vmks
      port: 8428
  customPricing:
    enabled: true
    createConfigmap: false   # Используем свой ConfigMap (см. custom-pricing-configmap.yaml): чарт генерирует неверный формат
    provider: custom
  ui:
    modelFqdn: "localhost:9003" # Обход проблемы hairpin NAT в Yandex Cloud K8s: nginx проксирует через localhost вместо ClusterIP
    ingress:
      enabled: true
      ingressClassName: "nginx"
      hosts:
      - host: opencost.apatsev.org.ru
        paths:
        - /
  mcp:
    ingress:
      enabled: true
      ingressClassName: "nginx"
      hosts:
      - host: mcp-opencost.apatsev.org.ru
        paths:
        - path: /
          pathType: Prefix
  metrics:
    serviceMonitor:
      enabled: true
      namespace: opencost
      interval: 10m
